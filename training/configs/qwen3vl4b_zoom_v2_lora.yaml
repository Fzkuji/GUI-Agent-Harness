# v2 LoRA SFT — Qwen3-VL-4B, multi-source variable-depth zoom data.
#
# Changes vs v1 (qwen3vl4b_guiact_zoom_lora.yaml), driven by the v1 SSPro
# error analysis (61.0% on 300):
#   1. image_max_pixels 1048576 -> 2097152: 43% of v1 failures lost the target
#      at the FIRST crop because tiny targets vanish at ~1M px on 4K screens.
#      2M px keeps round-0 detail; rendered crops (short side 512-640) are
#      unaffected. VRAM fits easily on A100 80G at bs=1.
#   2. dataset zoom_sft_v2: GUIAct + Wave-UI + UGround mixed (icon accuracy
#      was 31.8% vs text 77.9% — icon-heavy sources close the knowledge gap),
#      variable trajectory depth, plausible recrop negatives.
#   3. epochs default 1 (the mixed set is ~4x the v1 pilot; one pass fits the
#      24h wall clock).
#
# Portable defaults; the train sbatch overrides machine paths on the CLI.

### model
model_name_or_path: Qwen/Qwen3-VL-4B-Instruct   # overridden by sbatch
image_max_pixels: 2097152
video_max_pixels: 16384
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: all

### dataset
dataset_dir: data                                # overridden by sbatch
dataset: zoom_sft_v2
template: qwen3_vl_nothink
cutoff_len: 4096
overwrite_cache: true
preprocessing_num_workers: 8
dataloader_num_workers: 4

### output
output_dir: saves/qwen3vl4b_zoom_v2_lora         # overridden by sbatch
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: true
save_only_model: true
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null
