# abl_no_verify.yaml — 设计级消融:抽掉「视觉验证(visual verification)」= 设计③
#
# 基线 = sspro_stack_zoom.yaml(三设计全开),关闭把框画回图复查的环节:
#   enable_crop_check:   true -> false (每轮不复查裁剪框是否框对)
#   enable_final_recheck:true -> false (定坐标后不在更宽图上复查点对不对)
# 注:crop_retry 由 crop_check 触发,check 关后自然不重试(保留开关无副作用)。
# 保留:坐标注入(①)、自适应裁剪(②)。用于测量视觉验证的边际贡献。

locator_mode: iterative_zoom
context_mode: single
accumulate_images: false

iterative_rounds: 8
iterative_scale_mode: preserve
iterative_prompt_layout: cache
iterative_max_side: 0
iterative_max_scale: 5
iterative_min_short_side: 512
iterative_min_scale: 1.0
iterative_final_max_side: 0
iterative_final_max_scale: 8
iterative_final_min_short_side: 640
iterative_final_min_scale: 1.0
iterative_max_area_pct: 0
iterative_padding_pct: 8
iterative_min_width: 240
iterative_min_height: 80
iterative_final_candidates: 80
iterative_stage1_min_area_pct: 20
iterative_stage2_min_area_pct: 8

enable_staged_crop: true
enable_crop_check: false                # ← 去③ 不复查裁剪框
crop_check_mode: every
crop_check_reject_mode: widen
enable_crop_retry: true
crop_retry_limit: 6
enable_final_candidate_detect: true
enable_final_recheck: false             # ← 去③ 不复查最终点
enable_final_verify: false
enable_final_recrop: true
final_recrop_limit: 3
enable_legacy_pipeline: false

candidate_sort: relevance
candidate_limit: 60
candidate_dedup_iou: 0.0
reasoning_first: false
coords_crop_local: false

target_convention: control
exhaustion_fallback: keep_best

runtime_timeout_s: 180
