# ui_vision_gpt_zoom.yaml — UI-Vision 上 GPT 级模型的 iterative_zoom 配置。
#
# 设计(2026-06-10,基于 300 样本 M3 解耦实验):
#   - 骨架 = best.yaml(8 轮、每轮 commit gate、retry 6):M3 实验证明
#     m3_optimal 的 last_only 让早期"裁丢目标"无门拦截(crop-loses-GT 是
#     主导失败模式),所以这里用每轮复查。
#   - target_convention: element:UI-Vision 标注"被命名元素本体"(标签文字/
#     图标自身),不是 SSPro 的"可点击控件"。
#   - exhaustion_fallback: keep_best:M3 上 24% 样本所有 final 尝试耗尽返回
#     None(自动判错)。保底返回最深 commit crop 中心,有答案总比没答案强。
#   - candidate_sort: relevance:唯一被消融证明的稳定正收益开关。
#
# SSPro 回归安全:本文件只用于 UI-Vision 跑分;SSPro 配置(best.yaml /
# quality_8round)不含 element / keep_best,代码路径上两个新知识点的默认值
# (control / none)保持字节级旧行为。
#
# 跑法:
#   python run_screenspot_pro.py --config benchmarks/screenspot_pro/configs/ui_vision_gpt_zoom.yaml \
#     --data-dir benchmarks/screenspot_pro/data_ui_vision --annotation ui_vision_basic.json ...

locator_mode: iterative_zoom
context_mode: single
accumulate_images: false

# ── 迭代骨架:精度优先(同 best.yaml)─────────────────────
iterative_rounds: 8
iterative_scale_mode: preserve
iterative_prompt_layout: cache
iterative_max_side: 0
iterative_max_scale: 5
iterative_min_short_side: 512
iterative_min_scale: 1.0
iterative_final_max_side: 0
iterative_final_max_scale: 8
iterative_final_min_short_side: 640
iterative_final_min_scale: 1.0
iterative_max_area_pct: 0
iterative_padding_pct: 8
iterative_min_width: 240
iterative_min_height: 80
iterative_final_candidates: 80
iterative_stage1_min_area_pct: 20
iterative_stage2_min_area_pct: 8

# ── 验证步骤:每轮 commit gate(对 crop-loses-GT 的关键拦截)──
enable_staged_crop: true
enable_crop_check: true
crop_check_mode: every
crop_check_reject_mode: widen
enable_crop_retry: true
crop_retry_limit: 6
enable_final_candidate_detect: true
enable_final_recheck: true
enable_final_verify: false
enable_final_recrop: true
final_recrop_limit: 3          # 封顶:防病态尾巴(回放数据上限损失 ≤0.06pt)
enable_legacy_pipeline: false

# ── 候选列表:只开 sort(唯一已证正收益)─────────────────
candidate_sort: relevance
candidate_limit: 60
candidate_dedup_iou: 0.0
reasoning_first: false
coords_crop_local: false

# ── UI-Vision 专属 ────────────────────────────────────────
target_convention: element     # gt = 被命名元素本体,非关联控件
exhaustion_fallback: keep_best # 耗尽时返回最深 crop 中心而非 None

runtime_timeout_s: 180
